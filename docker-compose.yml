version: "3.9"

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sci_writer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis cache and message broker
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # LanguageTool (grammar checking — open source)
  languagetool:
    image: erikvl87/languagetool:latest
    ports:
      - "8010:8010"
    environment:
      - langtool_languageModel=/ngrams
      - Java_Xms=512m
      - Java_Xmx=1g
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./templates:/templates
      - uploads:/app/uploads
      - exports:/app/exports
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/sci_writer
      - DATABASE_URL_SYNC=postgresql+psycopg2://postgres:postgres@postgres:5432/sci_writer
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - LANGUAGE_TOOL_URL=http://languagetool:8010/v2/check
      - TEMPLATE_DIR=/templates
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery worker for async PDF compilation
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - ./templates:/templates
      - uploads:/app/uploads
      - exports:/app/exports
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/sci_writer
      - DATABASE_URL_SYNC=postgresql+psycopg2://postgres:postgres@postgres:5432/sci_writer
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - TEMPLATE_DIR=/templates
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
  exports:
